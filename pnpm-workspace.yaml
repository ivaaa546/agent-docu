packages:
  - 'apps/*'
  - 'packages/*'

onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - sharp
  - unrs-resolver
  - '@google/genai'
  - protobufjs

minimumReleaseAgeExclude:
  - '@fastify/cookie'

allowBuilds:
  '@google/genai': set this to true or false
  protobufjs: set this to true or false
